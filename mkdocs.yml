# ==========================================
# 1. INFORMACIÓN GENERAL Y SEO TÉCNICO
# ==========================================
site_name: DataHub
site_url: https://yeriel.github.io/DataHub/
site_author: Yeriel Paz Ureta
site_description: >-
  Aprende Machine Learning, MLOps y Análisis de Datos en español. 
  Un repositorio técnico con fundamentos de Python, Matemáticas y Estadística, 
  desde la teoría hasta el despliegue en producción.

# ==========================================
# 2. CONFIGURACIÓN DEL TEMA (Material Design)
# ==========================================
theme:
  name: material
  language: es
  logo: assets/images/logo.png 
  favicon: assets/images/oso_favicon.svg
  
  # Iconos y Logotipos
  icon:
    repo: fontawesome/brands/github
  
  # Identidad Visual: Colores y Modos
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Pasar a modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Pasar a modo claro

  # Funcionalidades de Interfaz (Optimizadas para UX y SEO)
  features:
    - navigation.instant     # Carga páginas sin refrescar (mejor velocidad/SEO)
    - navigation.tracking    # Sincroniza la URL con el scroll
    - navigation.path        # Breadcrumbs superiores
    - navigation.sections    # Grupos visuales en el menú
    - navigation.indexes     # Carpetas como enlaces
    - navigation.top         # Botón "Volver arriba"
    - content.code.copy      # Botón copiar código
    - content.code.annotate  # Notas en código
    - content.tabs.link      # Sincroniza pestañas
    - search.highlight       # Resalta términos buscados
    - search.share           # Enlaces para compartir búsquedas
    - search.suggest         # Sugerencias automáticas en el buscador

# ==========================================
# 3. PLUGINS (SEO y Rendimiento)
# ==========================================
plugins:
  - search                   # Buscador integrado
  - awesome-nav
  - minify:
      minify_html: true
      minify_js: true     
      minify_css: true
      cache_safe: true

# ==========================================
# 4. EXTENSIONES DE MARKDOWN
# ==========================================
markdown_extensions:
  # --- Matemáticas (LaTeX) ---
  - pymdownx.arithmatex:
      generic: true

  # --- Código Avanzado ---
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  # --- Componentes Visuales ---
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

# ==========================================
# 5. RECURSOS Y REDES SOCIALES
# ==========================================
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yeriel
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/yeriel-paz

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/MathJax.js?config=TeX-MML-AM_CHTML

extra_css:
  - stylesheets/extra.css